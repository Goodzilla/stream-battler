<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Crown Base (Gold) -->
  <rect x="2" y="11" width="12" height="2" fill="#eab308" />
  <rect x="3" y="10" width="10" height="1" fill="#eab308" />
  <!-- Left Peak -->
  <rect x="2" y="6" width="2" height="4" fill="#eab308" />
  <rect x="3" y="5" width="2" height="1" fill="#eab308" />
  <!-- Center Peak -->
  <rect x="7" y="4" width="2" height="6" fill="#eab308" />
  <rect x="6" y="5" width="4" height="1" fill="#eab308" />
  <!-- Right Peak -->
  <rect x="12" y="6" width="2" height="4" fill="#eab308" />
  <rect x="11" y="5" width="2" height="1" fill="#eab308" />
  <!-- Gems (Neon Blue, Purple, Red) -->
  <rect x="3" y="8" width="1" height="1" fill="#3b82f6" />
  <rect x="7" y="7" width="2" height="1" fill="#af52de" />
  <rect x="12" y="8" width="1" height="1" fill="#ef4444" />
  <!-- Highlights (White) -->
  <rect x="7" y="4" width="1" height="1" fill="#ffffff" />
  <rect x="3" y="5" width="1" height="1" fill="#ffffff" />
  <rect x="12" y="5" width="1" height="1" fill="#ffffff" />
</svg>